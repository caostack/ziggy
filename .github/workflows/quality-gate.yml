name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: 🔒 Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Zig
        uses: goto-bus/setup-zig@v2
        with:
          version: 0.15.2

      - name: 📝 Format Check
        run: zig fmt --check .

      - name: 🔨 Build
        run: zig build

      - name: 🧪 Test
        run: zig build test
